    <style>
        /* 设置板块之间无边缘,且固定屏幕，无滚轮条 */
        body {
            margin: 0;
            padding:0;
            overflow:hidden;
            background-color: #f1f1f1;
        }
        
        /* !!!头部样式!!! */
        .header {
            background-color: #f1f1f1;
            padding: 5px;
			height: auto;
			display: flex;
            clear: both;
        }

		/* 头部的三部分内容 */
		.header .h_content_left {
            width: 20%;
        }
		.header .h_content_middle {
            width: 50%;
        }
		.header .h_content_right {
            width: 30%;
            text-align:right;
        }

        /* 按钮边框设置为无 */
		.btn-default{
			border-style:none;
            background-color:transparent;
		}

        /* !!!导航栏的内容!!! */
        .navigationer .navigationer_left {
            float: left;
            width: 20%;
            height: 4.8vh;
            padding: 0px;
            background-color: #f1f1f1;
            border-bottom-style:solid;
	        border-color:#0099ff;
        }
        .navigationer .navigationer_right {
            float: left;
            width: 80%;
            height: 4.8vh;
            padding: 0;
            background-color: #f1f1f1;
            overflow-x:auto;
            border-bottom-style:solid;
	        border-color:#0099ff;
        }
        .navigationer:after {
            display: table;
            clear: both;
        }

        /* !!!中间两个列的内容!!! */
        .content_raw .content_left {
            float: left;
            width: 20%;
            height: 90vh;
            padding: 40px;
            background-color: #f1f1f1;
            overflow-y:auto;
        }
        .content_raw .content_right {
            float: left;
            width: 80%;
            height: 90vh;
            padding: 0;
            background-color: #ffffff;
        }

        /* 列后清除浮动 */
        .content_row:after {
            display: table;
            clear: both;
        }
    </style>

    <script>
        function init(){
            startTime();
            console.log("Init Successfully!");
        }
        function startTime(){
            var today=new Date();
            var h=today.getHours();
            var m=today.getMinutes();
            var s=today.getSeconds();// 在小于10的数字前加一个‘0’
            m=checkTime(m);
            s=checkTime(s);
            document.getElementById('time').innerHTML=h+":"+m+":"+s;
            t=setTimeout(function(){startTime()},500);
        }
        function checkTime(i){
            if (i<10){
                i="0" + i;
            }
            return i;
        }
    </script>
</head>
